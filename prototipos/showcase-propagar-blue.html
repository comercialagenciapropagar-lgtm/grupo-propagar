<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Propagar — Sistema + Instagram na paleta azul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --bg-2: #0a0f1c;
    --bg-3: #101728;
    --blue: #2a5299;
    --blue-bright: #5b8dc7;
    --blue-deep: #1a3268;
    --blue-glow: rgba(91,141,199,0.25);
    --border: rgba(91,141,199,0.3);
    --border-soft: rgba(255,255,255,0.06);
    --text: #f2f5fa;
    --muted: #7e8698;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER DO SHOWCASE ===== */
  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-2);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .brand-lockup {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-lockup svg.logo { width: 30px; height: 30px; color: var(--blue-bright); }
  .brand-lockup .word {
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .brand-lockup .word .dim { color: var(--blue-bright); }
  .brand-lockup .tagline {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-3);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border-soft);
  }
  .tabs button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tabs button.active {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 3px 10px var(--blue-glow);
  }
  .tabs button .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--blue-bright);
  }
  .tabs button.active .dot { background: #fff; }

  .mode-split {
    margin-left: auto;
    display: flex;
    gap: 4px;
    background: var(--bg-3);
    padding: 3px;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
  }
  .mode-split button {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 5px;
    cursor: pointer;
  }
  .mode-split button.active { background: var(--blue-bright); color: #0a0f1c; }

  /* ===== FRAMES ===== */
  main {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  .frame-wrap {
    height: 100%;
    display: grid;
    transition: grid-template-columns 0.3s ease;
  }
  /* Mode single: mostra apenas o selecionado */
  body[data-mode="single"][data-view="dash"] .frame-wrap { grid-template-columns: 1fr 0fr; }
  body[data-mode="single"][data-view="insta"] .frame-wrap { grid-template-columns: 0fr 1fr; }
  /* Mode split: lado a lado */
  body[data-mode="split"] .frame-wrap { grid-template-columns: 1fr 1fr; gap: 2px; }

  .frame {
    overflow: hidden;
    position: relative;
    min-width: 0;
  }
  .frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: var(--bg);
  }
  .frame.is-hidden { overflow: hidden; width: 0; }

  .frame .frame-label {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(5,8,16,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--blue-bright);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 700;
    z-index: 100;
    pointer-events: none;
  }
  body[data-mode="single"] .frame-label { display: none; }

  /* Divider visual no split */
  body[data-mode="split"] .frame-wrap::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 1px;
    background: var(--blue-bright);
    opacity: 0.25;
    z-index: 10;
    pointer-events: none;
  }

  /* Paleta strip no rodapé */
  footer {
    background: var(--bg-2);
    border-top: 1px solid var(--border-soft);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    color: var(--muted);
  }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  footer .spacer { flex: 1; }
  footer .hint {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  @media (max-width: 900px) {
    body[data-mode="split"] .frame-wrap { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    body[data-mode="split"] .frame-wrap::before { left: 0; right: 0; width: auto; height: 1px; top: 50%; }
  }
</style>
</head>
<body data-view="dash" data-mode="split">

  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <symbol id="wedges" viewBox="0 0 100 100">
        <polygon points="8,28 38,50 8,72" fill="currentColor" opacity="0.55"/>
        <polygon points="34,22 66,50 34,78" fill="currentColor" opacity="0.8"/>
        <polygon points="62,14 94,50 62,86" fill="currentColor"/>
      </symbol>
    </defs>
  </svg>

  <header>
    <div class="brand-lockup">
      <svg class="logo"><use href="#wedges"/></svg>
      <div>
        <div class="word">HUB<span class="dim">·PROPAGAR</span></div>
        <div class="tagline">paleta azul aprovada</div>
      </div>
    </div>

    <div class="tabs">
      <button id="tab-dash" onclick="show('dash')"><span class="dot"></span>Sistema</button>
      <button id="tab-insta" onclick="show('insta')"><span class="dot"></span>Instagram</button>
    </div>

    <div class="mode-split">
      <button id="m-single" onclick="setMode('single')">Tela cheia</button>
      <button id="m-split" onclick="setMode('split')" class="active">Lado a lado</button>
    </div>
  </header>

  <main>
    <div class="frame-wrap">
      <div class="frame frame-dash">
        <div class="frame-label">Sistema · Dashboard</div>
        <iframe src="hub-propagar-dashboard-blue.html" loading="eager"></iframe>
      </div>
      <div class="frame frame-insta">
        <div class="frame-label">Instagram · Feed</div>
        <iframe src="instagram-feed-blue.html" loading="eager"></iframe>
      </div>
    </div>
  </main>

  <footer>
    <span>Paleta Propagar:</span>
    <div class="swatch" style="background:#1a3268;" title="#1a3268"></div>
    <div class="swatch" style="background:#2a5299;" title="#2a5299"></div>
    <div class="swatch" style="background:#3b6fa0;" title="#3b6fa0"></div>
    <div class="swatch" style="background:#5b8dc7;" title="#5b8dc7"></div>
    <span style="color: var(--text); font-weight: 600;">Marca coerente em sistema + social.</span>
    <span class="spacer"></span>
    <span class="hint">Sistema ↔ Instagram · mesma identidade</span>
  </footer>

  <script>
    function show(view) {
      document.body.setAttribute('data-view', view);
      document.getElementById('tab-dash').classList.toggle('active', view === 'dash');
      document.getElementById('tab-insta').classList.toggle('active', view === 'insta');
      // Se estava em split e clica uma aba, vai pra single
      if (document.body.getAttribute('data-mode') === 'split') {
        setMode('single');
      }
    }
    function setMode(mode) {
      document.body.setAttribute('data-mode', mode);
      document.getElementById('m-single').classList.toggle('active', mode === 'single');
      document.getElementById('m-split').classList.toggle('active', mode === 'split');
      // No split, destaca as duas abas
      if (mode === 'split') {
        document.getElementById('tab-dash').classList.add('active');
        document.getElementById('tab-insta').classList.add('active');
      } else {
        const v = document.body.getAttribute('data-view');
        document.getElementById('tab-dash').classList.toggle('active', v === 'dash');
        document.getElementById('tab-insta').classList.toggle('active', v === 'insta');
      }
    }
    // Inicializa no split
    setMode('split');
  </script>
</body>
</html>
